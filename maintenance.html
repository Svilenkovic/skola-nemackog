<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sajt u održavanju</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            font-family: 'Segoe UI', -apple-system, sans-serif;
            color: #e2e8f0;
            padding: 20px;
        }
        .container { max-width: 500px; text-align: center; }
        .icon { font-size: 80px; margin-bottom: 24px; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
        h1 { font-size: 28px; margin-bottom: 16px; color: #f59e0b; }
        .message { font-size: 16px; color: #94a3b8; line-height: 1.6; }
        .contact { margin-top: 32px; font-size: 14px; color: #64748b; }
        .contact a { color: #6366f1; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔧</div>
        <h1>Sajt je u održavanju</h1>
        <p class="message">Radimo na poboljšanju sajta. Molimo pokušajte ponovo kasnije.</p>
        <p class="contact">Kontakt: <a href="https://svilenkovic.com">svilenkovic.com</a></p>
    </div>
</body>
</html>
